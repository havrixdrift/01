---
layout: null
---


<center><b>Latest Posts</b></center>
{% for post in site.categories.seo01 %}
<div class="post-item">
  <h2>
    <a href="{{ post.url }}">
      {{ post.title }}
    </a>
  </h2>
  <div class="excerpt">
    {{ post.description }}
  </div>
  {% assign before_svg = post.content | split: '<p>' | first %}
  <div class="excerpt spoo">
    {{ before_svg }}
  </div>
</div>
{% endfor %}
